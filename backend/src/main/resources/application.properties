spring.application.name=ecommerce-backend
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/busybrains_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
app.jwt.secret=${APP_JWT_SECRET:VGhpc0lzQVN0cm9uZ0RlbW9TZWNyZXRLZXlGb3JCdXN5QnJhaW5zQXBw}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
