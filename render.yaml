services:
  - type: web
    name: busybrains-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/ecommerce-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 10000
      - key: APP_FRONTEND_URL
        value: https://eeswar889.github.io/Busybrains
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://eeswar889.github.io
